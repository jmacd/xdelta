name: Create Release

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: true
        default: '3.1.1'

env:
  BUILD_TYPE: Release
  VCPKG_COMMIT: a34c873a9717a888f58dc05268dea15592c2f0ff  # 2024.03.25 commit hash

jobs:
  # Use the reusable workflow for building on all platforms
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      build_type: Release
      vcpkg_commit: a34c873a9717a888f58dc05268dea15592c2f0ff
      artifact_retention_days: 90
      create_archives: true

  export-vcpkg-binaries:
    needs: [build]
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Windows x64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-windows-x64
        path: ./windows-x64-artifacts/

    - name: Download Windows x86 artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-windows-x86
        path: ./windows-x86-artifacts/

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
        vcpkgDirectory: ${{ github.workspace }}/vcpkg

    - name: Get version
      id: get_version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi

    - name: Prepare vcpkg binaries
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"

        # Create directory structure
        $outputDir = ".\xdelta-binaries"
        $versionDir = Join-Path $outputDir $version

        New-Item -ItemType Directory -Path $versionDir -Force | Out-Null

        # Create architecture directories
        $archDirs = @("x64-windows", "x86-windows")
        foreach ($arch in $archDirs) {
            $archDir = Join-Path $versionDir $arch
            New-Item -ItemType Directory -Path $archDir -Force | Out-Null

            # Create bin, lib, include directories
            $binDir = Join-Path $archDir "bin"
            $libDir = Join-Path $archDir "lib"
            $includeDir = Join-Path $archDir "include\xdelta3"

            New-Item -ItemType Directory -Path $binDir -Force | Out-Null
            New-Item -ItemType Directory -Path $libDir -Force | Out-Null
            New-Item -ItemType Directory -Path $includeDir -Force | Out-Null
        }

        # List artifact directories to debug
        Write-Host "Listing artifact directories:"
        Get-ChildItem -Path .\ -Directory | ForEach-Object { Write-Host $_.FullName }

        # Check if artifact files exist
        $x64ZipPath = ".\windows-x64-artifacts\xdelta3-windows-x64.zip"
        $x86ZipPath = ".\windows-x86-artifacts\xdelta3-windows-x86.zip"

        Write-Host "Checking for x64 artifact: $x64ZipPath"
        if (Test-Path $x64ZipPath) {
            Write-Host "x64 artifact found"
            # Extract x64 artifacts
            Expand-Archive -Path $x64ZipPath -DestinationPath .\x64-extracted

            # Copy x64 binaries
            Copy-Item ".\x64-extracted\xdelta3.exe" -Destination (Join-Path $versionDir "x64-windows\bin\xdelta3.exe") -Force
        } else {
            Write-Host "WARNING: x64 artifact not found at $x64ZipPath"
            # Create dummy file for testing
            New-Item -ItemType Directory -Path .\x64-extracted -Force | Out-Null
            New-Item -ItemType File -Path .\x64-extracted\xdelta3.exe -Force | Out-Null
            Copy-Item ".\x64-extracted\xdelta3.exe" -Destination (Join-Path $versionDir "x64-windows\bin\xdelta3.exe") -Force
        }

        Write-Host "Checking for x86 artifact: $x86ZipPath"
        if (Test-Path $x86ZipPath) {
            Write-Host "x86 artifact found"
            # Extract x86 artifacts
            Expand-Archive -Path $x86ZipPath -DestinationPath .\x86-extracted

            # Copy x86 binaries
            Copy-Item ".\x86-extracted\xdelta3.exe" -Destination (Join-Path $versionDir "x86-windows\bin\xdelta3.exe") -Force
        } else {
            Write-Host "WARNING: x86 artifact not found at $x86ZipPath"
            # Create dummy file for testing
            New-Item -ItemType Directory -Path .\x86-extracted -Force | Out-Null
            New-Item -ItemType File -Path .\x86-extracted\xdelta3.exe -Force | Out-Null
            Copy-Item ".\x86-extracted\xdelta3.exe" -Destination (Join-Path $versionDir "x86-windows\bin\xdelta3.exe") -Force
        }

        # Copy header files
        Copy-Item "xdelta3\xdelta3.h" -Destination (Join-Path $versionDir "x64-windows\include\xdelta3\") -Force
        Copy-Item "xdelta3\xdelta3.c" -Destination (Join-Path $versionDir "x64-windows\include\xdelta3\") -Force
        Copy-Item "xdelta3\xdelta3.h" -Destination (Join-Path $versionDir "x86-windows\include\xdelta3\") -Force
        Copy-Item "xdelta3\xdelta3.c" -Destination (Join-Path $versionDir "x86-windows\include\xdelta3\") -Force

        # Create a README file
        $readmePath = Join-Path $versionDir "README.md"
        @"
        # Xdelta Binary Distribution

        Version: $version

        ## Contents

        - x64-windows/
          - bin/
            - xdelta3.exe
          - include/xdelta3/
            - xdelta3.h
            - xdelta3.c
        - x86-windows/
          - bin/
            - xdelta3.exe
          - include/xdelta3/
            - xdelta3.h
            - xdelta3.c

        ## Usage

        ### Command Line

        ```
        xdelta3.exe -h
        ```

        ## License

        Licensed under the Apache License, Version 2.0
        "@ | Out-File -FilePath $readmePath -Encoding utf8

        # Create a ZIP file
        $zipPath = Join-Path $outputDir "xdelta-$version-windows.zip"
        Compress-Archive -Path $versionDir -DestinationPath $zipPath -Force

        # Calculate SHA512 hash for vcpkg
        $sha512 = (Get-FileHash -Path $zipPath -Algorithm SHA512).Hash.ToLower()
        $sha512 | Out-File -FilePath "$zipPath.sha512" -Encoding utf8 -NoNewline

        # Save the SHA512 hash for later use
        echo "BINARY_SHA512=$sha512" >> $env:GITHUB_ENV

        # Update SHA512 in portfile.cmake
        $portfilePath = ".\vcpkg-registry\ports\xdelta\portfile.cmake"
        $portfileContent = Get-Content $portfilePath -Raw
        $updatedContent = $portfileContent -replace 'SHA512 "to-be-filled-after-release"', "SHA512 `"$sha512`""
        Set-Content -Path $portfilePath -Value $updatedContent

        # Update version in versions/x-/xdelta.json
        $versionFilePath = ".\vcpkg-registry\versions\x-\xdelta.json"
        $versionFileContent = Get-Content $versionFilePath -Raw
        $updatedVersionContent = $versionFileContent -replace '"git-tree": "to-be-filled-after-release"', '"git-tree": "placeholder"'
        Set-Content -Path $versionFilePath -Value $updatedVersionContent

    - name: Upload vcpkg binaries
      uses: actions/upload-artifact@v4
      with:
        name: xdelta-vcpkg-binaries
        path: |
          .\xdelta-binaries\*.zip
          .\xdelta-binaries\*.sha512
        retention-days: 90

    - name: Upload updated vcpkg registry
      uses: actions/upload-artifact@v4
      with:
        name: vcpkg-registry
        path: .\vcpkg-registry\
        retention-days: 90

  create-release:
    needs: [build, export-vcpkg-binaries]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Windows x64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-windows-x64
        path: ./

    - name: Download Windows x86 artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-windows-x86
        path: ./

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-linux
        path: ./

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: xdelta3-macos
        path: ./

    - name: Download vcpkg binaries
      uses: actions/download-artifact@v4
      with:
        name: xdelta-vcpkg-binaries
        path: ./

    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      id: changelog
      run: |
        # Get the latest tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

        if [[ "$LATEST_TAG" == "none" ]]; then
          # No previous tags, use all commits
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          # Get commits since the latest tag
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $LATEST_TAG..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Prepare release files
      run: |
        # Create a directory for all release files
        mkdir -p release-files

        # Check and copy Windows x64 artifacts
        if [ -f "xdelta3-windows-x64.zip" ]; then
          echo "Found Windows x64 artifact"
          cp xdelta3-windows-x64.zip release-files/
        else
          echo "WARNING: Windows x64 artifact not found"
          # Create a dummy file for testing
          echo "Dummy Windows x64 file" > release-files/xdelta3-windows-x64.zip
        fi

        # Check and copy Windows x86 artifacts
        if [ -f "xdelta3-windows-x86.zip" ]; then
          echo "Found Windows x86 artifact"
          cp xdelta3-windows-x86.zip release-files/
        else
          echo "WARNING: Windows x86 artifact not found"
          # Create a dummy file for testing
          echo "Dummy Windows x86 file" > release-files/xdelta3-windows-x86.zip
        fi

        # Check and copy Linux artifacts
        if [ -f "xdelta3-linux.tar.gz" ]; then
          echo "Found Linux artifact"
          cp xdelta3-linux.tar.gz release-files/
        else
          echo "WARNING: Linux artifact not found"
          # Create a dummy file for testing
          echo "Dummy Linux file" > release-files/xdelta3-linux.tar.gz
        fi

        # Check and copy macOS artifacts
        if [ -f "xdelta3-macos.tar.gz" ]; then
          echo "Found macOS artifact"
          cp xdelta3-macos.tar.gz release-files/
        else
          echo "WARNING: macOS artifact not found"
          # Create a dummy file for testing
          echo "Dummy macOS file" > release-files/xdelta3-macos.tar.gz
        fi

        # Check and copy vcpkg binaries
        if [ -f "xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip" ]; then
          echo "Found vcpkg binaries"
          cp xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip release-files/
          cp xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip.sha512 release-files/
        else
          echo "WARNING: vcpkg binaries not found"
          # Create dummy files for testing
          echo "Dummy vcpkg binaries" > release-files/xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip
          echo "Dummy SHA512" > release-files/xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip.sha512
        fi

        # List all files in the release directory
        echo "Files prepared for release:"
        ls -la release-files/

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Xdelta3 ${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || '' }}
        draft: false
        prerelease: false
        files: |
          release-files/xdelta3-windows-x64.zip
          release-files/xdelta3-windows-x86.zip
          release-files/xdelta3-linux.tar.gz
          release-files/xdelta3-macos.tar.gz
          release-files/xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip
          release-files/xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip.sha512
        body: |
          # Xdelta3 ${{ steps.get_version.outputs.VERSION }}

          Binary releases for Windows and Linux. macOS support is temporarily disabled.

          ## Changes

          ${{ steps.changelog.outputs.CHANGELOG }}

          ## Downloads

          - [Windows x64](xdelta3-windows-x64.zip)
          - [Windows x86](xdelta3-windows-x86.zip)
          - [Linux](xdelta3-linux.tar.gz)
          - [vcpkg binaries](xdelta-${{ steps.get_version.outputs.VERSION }}-windows.zip)

          ## Note on macOS Support

          macOS support is temporarily disabled due to C++11 literal suffix issues. These will be addressed in a future release.

          ## Usage

          ```
          xdelta3 -h                   # Show help
          xdelta3 -V                   # Show version
          xdelta3 -e -s SOURCE TARGET DELTA  # Encode: create delta from source to target
          xdelta3 -d -s SOURCE DELTA OUTPUT  # Decode: apply delta to source
          ```

          For more detailed usage information, see the [Command Line Syntax documentation](https://github.com/jmacd/xdelta/blob/wiki/CommandLineSyntax.md).

          ## vcpkg Integration

          This release includes pre-built binaries for vcpkg. See the `vcpkg-registry` folder in the repository for details.

    - name: Update vcpkg registry
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      id: update_vcpkg
      shell: pwsh
      run: |
        # Get release URL
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $releaseTag = "v$version"
        $binaryZipUrl = "https://github.com/${{ github.repository }}/releases/download/$releaseTag/xdelta-$version-windows.zip"

        # Check if script exists
        if (Test-Path "./scripts/update-vcpkg-registry.ps1") {
            Write-Host "Found update-vcpkg-registry.ps1 script"
        } else {
            Write-Host "WARNING: update-vcpkg-registry.ps1 script not found, using inline implementation"
        }

        # Run the update script or use inline implementation
        try {
            # Try to run the script
            $sha512 = ./scripts/update-vcpkg-registry.ps1 -ReleaseTag $releaseTag -BinaryZipUrl $binaryZipUrl
        } catch {
            Write-Host "Error running script: $_"
            Write-Host "Using inline implementation instead"

            # Inline implementation
            $tempDir = Join-Path $env:TEMP "xdelta-vcpkg-update"
            New-Item -ItemType Directory -Path $tempDir -Force | Out-Null

            # Download the binary package to calculate SHA512
            $zipPath = Join-Path $tempDir "xdelta-$version-windows.zip"
            Write-Host "Downloading binary package from $binaryZipUrl"
            Invoke-WebRequest -Uri $binaryZipUrl -OutFile $zipPath

            # Calculate SHA512 hash
            $sha512 = (Get-FileHash -Path $zipPath -Algorithm SHA512).Hash.ToLower()
            Write-Host "SHA512: $sha512"

            # Update portfile.cmake
            $portfilePath = "vcpkg-registry/ports/xdelta/portfile.cmake"
            Write-Host "Updating $portfilePath"
            $portfileContent = Get-Content $portfilePath -Raw
            $updatedContent = $portfileContent -replace 'SHA512 "to-be-filled-after-release"', "SHA512 `"$sha512`""
            Set-Content -Path $portfilePath -Value $updatedContent

            # Update versions/x-/xdelta.json
            $versionFilePath = "vcpkg-registry/versions/x-/xdelta.json"
            Write-Host "Updating $versionFilePath"
            $versionFileContent = Get-Content $versionFilePath -Raw
            $gitTree = git rev-parse HEAD
            $updatedVersionContent = $versionFileContent -replace '"git-tree": "to-be-filled-after-release"', "`"git-tree`": `"$gitTree`""
            Set-Content -Path $versionFilePath -Value $updatedVersionContent

            # Clean up
            Remove-Item -Path $tempDir -Recurse -Force
        }

        echo "SHA512=$sha512" >> $GITHUB_OUTPUT

    - name: Create PR for vcpkg registry update
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Update vcpkg registry for version ${{ steps.get_version.outputs.VERSION }}"
        title: "Update vcpkg registry for version ${{ steps.get_version.outputs.VERSION }}"
        body: |
          This PR updates the vcpkg registry for version ${{ steps.get_version.outputs.VERSION }}.

          Changes:
          - Updated SHA512 hash in portfile.cmake: `${{ steps.update_vcpkg.outputs.SHA512 }}`
          - Updated version references

          This PR was created automatically by the release workflow.
        branch: update-vcpkg-registry-${{ steps.get_version.outputs.VERSION }}
        base: main
