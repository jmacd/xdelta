name: Release Workflow

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: false
        default: ''
      create_release:
        description: 'Create GitHub release if it does not exist'
        required: false
        default: false
        type: boolean

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # For release event, extract version from tag
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            # For workflow_dispatch with version input
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract from CMakeLists.txt - specifically look for project version
            # Use a more reliable grep pattern that doesn't rely on Perl regex
            VERSION=$(grep -o 'project(xdelta.*VERSION [0-9.]*' CMakeLists.txt | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')

            # If that fails, try a simpler pattern
            if [[ -z "$VERSION" ]]; then
              echo "First extraction method failed, trying alternative..."
              VERSION=$(grep 'VERSION' CMakeLists.txt | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1)
            fi

            # If still no version, use hardcoded fallback
            if [[ -z "$VERSION" ]]; then
              echo "Could not extract version from CMakeLists.txt"
              VERSION="3.1.0"
              echo "Using fallback version: $VERSION"
            fi
          fi

          # Validate version format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Warning: Version format is not X.Y.Z: '$VERSION'"
            echo "Falling back to hardcoded version 3.1.0"
            VERSION="3.1.0"
          fi

          echo "Using version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release if needed
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          name: Xdelta3 ${{ steps.get_version.outputs.version }}
          tag_name: v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            # Xdelta3 ${{ steps.get_version.outputs.version }}

            Automatic release created by GitHub Actions.

            ## Included Files
            - Windows binaries (x64, x86)
            - Linux binaries
            - vcpkg package files

  build-binaries:
    name: Build Binaries
    needs: get-version
    uses: ./.github/workflows/reusable-build.yml
    with:
      build_type: Release
      create_archives: true
      artifact_retention_days: 90

  package:
    name: Package for vcpkg
    needs: [get-version, build-binaries]
    runs-on: windows-latest
    outputs:
      sha512: ${{ steps.outputs.outputs.sha512 }}
      version: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: List downloaded artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse downloaded-artifacts | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Make scripts executable
        shell: bash
        run: |
          chmod +x .github/scripts/make-scripts-executable.sh
          .github/scripts/make-scripts-executable.sh

      - name: Create vcpkg package structure
        id: package
        shell: pwsh
        run: |
          $version = "${{ needs.get-version.outputs.version }}"
          $sha512 = ./.github/scripts/prepare-vcpkg-package.ps1 -Version $version -ArtifactsDir "downloaded-artifacts"

          # Output hash for later use
          echo "SHA512 hash: $sha512"
          echo "sha512=$sha512" >> $env:GITHUB_OUTPUT

      - name: Upload vcpkg package
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-package
          path: xdelta-${{ needs.get-version.outputs.version }}-windows.zip*
          retention-days: 90

      - name: Set outputs
        id: outputs
        shell: pwsh
        run: |
          echo "sha512=${{ steps.package.outputs.sha512 }}" >> $env:GITHUB_OUTPUT

  release:
    name: Attach to GitHub Release
    needs: [get-version, build-binaries, package]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          files: |
            artifacts/xdelta3-windows-x64/xdelta3-windows-x64.zip
            artifacts/xdelta3-windows-x86/xdelta3-windows-x86.zip
            artifacts/xdelta3-linux/xdelta3-linux.tar.gz
            artifacts/vcpkg-package/xdelta-${{ needs.get-version.outputs.version }}-windows.zip
            artifacts/vcpkg-package/xdelta-${{ needs.get-version.outputs.version }}-windows.zip.sha512

  update-vcpkg-registry:
    name: Update vcpkg Registry
    needs: [get-version, package, release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download vcpkg package
        uses: actions/download-artifact@v4
        with:
          name: vcpkg-package
          path: vcpkg-package

      - name: Get SHA512 hash
        id: get_hash
        run: |
          if [ -n "${{ needs.package.outputs.sha512 }}" ]; then
            # Use SHA512 from package job output
            SHA512="${{ needs.package.outputs.sha512 }}"
            echo "Using SHA512 from package job output: $SHA512"
            echo "SHA512=$SHA512" >> $GITHUB_OUTPUT
          elif [ -f "vcpkg-package/xdelta-${{ needs.get-version.outputs.version }}-windows.zip.sha512" ]; then
            # Use SHA512 from downloaded artifact
            SHA512=$(cat vcpkg-package/xdelta-${{ needs.get-version.outputs.version }}-windows.zip.sha512)
            echo "SHA512=$SHA512" >> $GITHUB_OUTPUT
            echo "SHA512 hash from file: $SHA512"
          else
            echo "SHA512 hash file not found, checking artifacts"
            find vcpkg-package -type f -name "*.sha512" | sort

            # Try to find any SHA512 file
            SHA512_FILE=$(find vcpkg-package -type f -name "*.sha512" | head -n 1)
            if [ -n "$SHA512_FILE" ]; then
              SHA512=$(cat "$SHA512_FILE")
              echo "SHA512=$SHA512" >> $GITHUB_OUTPUT
              echo "Using SHA512 hash from $SHA512_FILE: $SHA512"
            else
              echo "No SHA512 hash found, failing"
              exit 1
            fi
          fi

      - name: Make scripts executable
        shell: bash
        run: |
          chmod +x .github/scripts/make-scripts-executable.sh
          .github/scripts/make-scripts-executable.sh

      - name: Update vcpkg registry files
        run: |
          ./.github/scripts/update-vcpkg-registry.sh -v "${{ needs.get-version.outputs.version }}" -s "${{ steps.get_hash.outputs.SHA512 }}"

      - name: Verify vcpkg registry files
        run: |
          ./.github/scripts/verify-vcpkg-registry.sh -v "${{ needs.get-version.outputs.version }}" -s "${{ steps.get_hash.outputs.SHA512 }}"

      - name: Push to vcpkg-registry branch
        run: |
          # Configure git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Fetch latest changes from remote
          echo "Fetching latest changes from remote..."
          git fetch origin

          # Store current vcpkg-registry folder content
          echo "Storing vcpkg-registry folder content..."
          cp -r vcpkg-registry /tmp/vcpkg-registry-backup

          # Switch to vcpkg-registry branch and update it
          echo "Switching to vcpkg-registry branch..."
          if git ls-remote --heads origin vcpkg-registry | grep -q vcpkg-registry; then
            echo "vcpkg-registry branch exists, checking out and pulling latest..."
            # Use explicit remote reference to avoid ambiguity
            git checkout -B vcpkg-registry-temp origin/vcpkg-registry
            git branch -D vcpkg-registry 2>/dev/null || true
            git checkout -b vcpkg-registry
            git pull --rebase origin vcpkg-registry
          else
            echo "vcpkg-registry branch doesn't exist, creating new branch..."
            git checkout -b vcpkg-registry
          fi

          # Copy back the updated vcpkg-registry files
          echo "Copying updated vcpkg-registry files..."
          rm -rf vcpkg-registry 2>/dev/null || true
          cp -r /tmp/vcpkg-registry-backup vcpkg-registry

          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit to vcpkg-registry"
            exit 0
          fi

          # Add and commit vcpkg registry changes
          git add vcpkg-registry/
          git commit -m "Update vcpkg registry for version ${{ needs.get-version.outputs.version }}

          - Updated SHA512 hash in portfile.cmake: ${{ steps.get_hash.outputs.SHA512 }}
          - Updated version references
          - Updated git-tree reference
          - Updated baseline.json

          This commit was created automatically by the release workflow."

          # Push to vcpkg-registry branch
          git push origin vcpkg-registry

          echo "✅ Successfully pushed vcpkg registry updates to vcpkg-registry branch"
