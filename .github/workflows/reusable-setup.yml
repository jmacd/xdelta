name: Reusable Setup Workflow

on:
  workflow_call:
    inputs:
      vcpkg_commit:
        description: 'vcpkg commit to use'
        required: false
        type: string
        default: '2023.12.12'
      platform:
        description: 'Platform to build for (windows, linux, macos)'
        required: true
        type: string
      arch:
        description: 'Architecture to build for (x64, x86)'
        required: false
        type: string
        default: 'x64'
      triplet:
        description: 'vcpkg triplet to use'
        required: false
        type: string
        default: ''

jobs:
  setup:
    name: Setup ${{ inputs.platform }}-${{ inputs.arch }}
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'linux' && 'ubuntu-latest' || 'macos-latest' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Make all scripts executable
      - name: Make scripts executable
        shell: bash
        run: |
          if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
            chmod +x .github/scripts/make-scripts-executable.sh
            .github/scripts/make-scripts-executable.sh
          else
            echo "Script not found, making scripts executable manually"
            find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
          fi
      
      # Determine vcpkg triplet based on platform and arch
      - name: Determine vcpkg triplet
        id: triplet
        shell: bash
        run: |
          if [ -n "${{ inputs.triplet }}" ]; then
            echo "VCPKG_TRIPLET=${{ inputs.triplet }}" >> $GITHUB_ENV
          else
            if [ "${{ inputs.platform }}" = "windows" ]; then
              echo "VCPKG_TRIPLET=${{ inputs.arch }}-windows" >> $GITHUB_ENV
            elif [ "${{ inputs.platform }}" = "linux" ]; then
              echo "VCPKG_TRIPLET=x64-linux" >> $GITHUB_ENV
            elif [ "${{ inputs.platform }}" = "macos" ]; then
              echo "VCPKG_TRIPLET=x64-osx" >> $GITHUB_ENV
            else
              echo "::error::Unknown platform: ${{ inputs.platform }}"
              exit 1
            fi
          fi
          
          echo "Using vcpkg triplet: ${{ env.VCPKG_TRIPLET }}"
      
      # Setup vcpkg
      - name: Setup vcpkg
        uses: johnwason/vcpkg-action@v6
        id: vcpkg
        with:
          manifest-dir: ${{ github.workspace }}
          triplet: ${{ env.VCPKG_TRIPLET }}
          revision: ${{ inputs.vcpkg_commit }}
          token: ${{ github.token }}
          github-binarycache: true
          cache-key: vcpkg-${{ runner.os }}-${{ env.VCPKG_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
      
      # Setup ccache
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ inputs.platform }}-${{ inputs.arch }}
      
      # Output setup information
      - name: Output setup information
        id: setup_info
        shell: bash
        run: |
          echo "vcpkg_root=${{ steps.vcpkg.outputs.vcpkg_root }}" >> $GITHUB_OUTPUT
          echo "vcpkg_triplet=${{ env.VCPKG_TRIPLET }}" >> $GITHUB_OUTPUT
          echo "platform=${{ inputs.platform }}" >> $GITHUB_OUTPUT
          echo "arch=${{ inputs.arch }}" >> $GITHUB_OUTPUT
