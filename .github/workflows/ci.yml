name: Build and Release

on:
  push:
    branches: [ release3_1_apl, optimize-ci-workflows ]
  pull_request:
    branches: [ release3_1_apl ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        type: boolean
        default: false
      version:
        description: 'Version for release'
        required: false
        type: string
        default: '3.1.0'

jobs:
  # Windows x64 build
  build-windows-x64:
    name: Build Windows (x64)
    uses: ./.github/workflows/build-test.yml
    with:
      platform: windows
      arch: x64
      create_placeholders: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' }}

  # Windows x86 build
  build-windows-x86:
    name: Build Windows (x86)
    uses: ./.github/workflows/build-test.yml
    with:
      platform: windows
      arch: x86
      create_placeholders: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' }}

  # Linux build
  build-linux:
    name: Build Linux
    uses: ./.github/workflows/build-test.yml
    with:
      platform: linux
      create_placeholders: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' }}

  # Export vcpkg binaries
  export-vcpkg:
    name: Export vcpkg binaries
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'
      
      # Set environment variables to help with downloads
      - name: Set vcpkg environment variables
        run: |
          echo "VCPKG_KEEP_ENV_VARS=HTTP_PROXY;HTTPS_PROXY;http_proxy;https_proxy" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_MAX_CONCURRENCY=2" | Out-File -Append -FilePath $env:GITHUB_ENV
        shell: pwsh
      
      - name: Export vcpkg binaries
        run: |
          $version = "${{ github.event.inputs.version }}"
          $outputFile = "xdelta-$version-windows.zip"
          
          # Try to export with retry
          $maxAttempts = 3
          $attempt = 1
          
          while ($attempt -le $maxAttempts) {
            Write-Host "Attempt $attempt of $maxAttempts to export vcpkg binaries"
            
            try {
              # Export vcpkg binaries
              vcpkg export xdelta3 --zip --output=$outputFile
              
              # Check if export was successful
              if (Test-Path $outputFile) {
                Write-Host "✅ vcpkg export successful: $outputFile"
                break
              }
            }
            catch {
              Write-Host "Error during export: $_"
            }
            
            Write-Host "Attempt $attempt failed, waiting before retry..."
            Start-Sleep -Seconds 30
            $attempt++
          }
          
          if ($attempt -gt $maxAttempts) {
            Write-Host "❌ vcpkg export failed after $maxAttempts attempts"
            exit 1
          }
          
          # Create SHA512 hash
          $hash = Get-FileHash -Algorithm SHA512 -Path $outputFile
          $hash.Hash | Out-File -FilePath "$outputFile.sha512"
        shell: pwsh
      
      - name: Upload vcpkg binaries
        uses: actions/upload-artifact@v4
        with:
          name: xdelta-vcpkg-binaries
          path: |
            xdelta-${{ github.event.inputs.version }}-windows.zip
            xdelta-${{ github.event.inputs.version }}-windows.zip.sha512
          if-no-files-found: error

  # Prepare release
  prepare-release:
    name: Prepare Release
    needs: [build-windows-x64, build-windows-x86, build-linux, export-vcpkg]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    uses: ./.github/workflows/release-preparation.yml
    with:
      version: ${{ github.event.inputs.version }}
      create_placeholders: true

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    needs: prepare-release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' && needs.prepare-release.outputs.release_ok == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: release-files
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: xdelta v${{ github.event.inputs.version }}
          body: |
            xdelta v${{ github.event.inputs.version }} release
            
            ## Binaries
            - Windows (x64): xdelta3-windows-x64.zip
            - Windows (x86): xdelta3-windows-x86.zip
            - Linux: xdelta3-linux.tar.gz
            
            ## vcpkg Package
            - Windows: xdelta-${{ github.event.inputs.version }}-windows.zip
          files: |
            release-files/xdelta3-windows-x64.zip
            release-files/xdelta3-windows-x86.zip
            release-files/xdelta3-linux.tar.gz
            release-files/xdelta3-macos.tar.gz
            release-files/xdelta-${{ github.event.inputs.version }}-windows.zip
            release-files/xdelta-${{ github.event.inputs.version }}-windows.zip.sha512
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
