name: CI

on:
  push:
    branches: [ release3_1_apl, release3_0_apl, main ]
  pull_request:
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-20

      - name: Check formatting
        run: CLANG_FORMAT=clang-format-20 ./format.sh --check

  cmake:
    name: ${{ matrix.os }} / lzma=${{ matrix.lzma }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        lzma: [ "on", "off" ]
    defaults:
      run:
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Install liblzma (Linux)
        if: runner.os == 'Linux' && matrix.lzma == 'on'
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev

      - name: Install liblzma (macOS)
        if: runner.os == 'macOS' && matrix.lzma == 'on'
        run: brew install xz

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DXD3_LZMA_MODE=${{ matrix.lzma }}
          -DXD3_WERROR=ON
          -DCMAKE_PREFIX_PATH="$(brew --prefix 2>/dev/null || echo /usr)"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  cmake-small-usize:
    name: ${{ matrix.os }} / 32-bit usize_t
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    defaults:
      run:
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Configure (XD3_LARGESIZET=OFF)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DXD3_LARGESIZET=OFF
          -DXD3_LZMA_MODE=off
          -DXD3_WERROR=ON
          -DCMAKE_PREFIX_PATH="$(brew --prefix 2>/dev/null || echo /usr)"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  cmake-static-lzma:
    name: ${{ matrix.os }} / fetched static liblzma
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v5

      - name: Configure (XD3_LZMA_FETCH=ON)
        working-directory: xdelta3
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DXD3_LZMA_FETCH=ON

      - name: Build
        working-directory: xdelta3
        run: cmake --build build --config Release -j

      - name: Test
        working-directory: xdelta3
        run: ctest --test-dir build -C Release --output-on-failure

  windows:
    name: windows-latest / lzma=${{ matrix.lzma }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lzma: [ "on", "off" ]
    defaults:
      run:
        shell: pwsh
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Install liblzma (vcpkg)
        if: matrix.lzma == 'on'
        run: vcpkg install liblzma:x64-windows

      - name: Configure (no lzma)
        if: matrix.lzma == 'off'
        run: cmake -B build -A x64 -DXD3_LZMA_MODE=off -DXD3_WERROR=ON

      - name: Configure (vcpkg lzma)
        if: matrix.lzma == 'on'
        run: >
          cmake -B build -A x64 -DXD3_LZMA_MODE=on -DXD3_WERROR=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  library-consumer:
    name: ${{ matrix.os }} / library install + consumer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    defaults:
      run:
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Configure and build the library
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DXD3_LZMA_MODE=off
          -DXD3_WERROR=ON
          &&
          cmake --build build --config Release -j

      - name: Install to a staging prefix
        run: cmake --install build --prefix "$GITHUB_WORKSPACE/stage"

      - name: Build a find_package() consumer
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cp testing/lib_smoke.c "$RUNNER_TEMP/consumer/main.c"
          cat > "$RUNNER_TEMP/consumer/CMakeLists.txt" <<'EOF'
          cmake_minimum_required(VERSION 3.13)
          project(consumer C)
          find_package(xdelta3 REQUIRED)
          add_executable(app main.c)
          target_link_libraries(app PRIVATE xdelta3::xdelta3)
          EOF
          cmake -S "$RUNNER_TEMP/consumer" -B "$RUNNER_TEMP/consumer/build" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/stage"
          cmake --build "$RUNNER_TEMP/consumer/build"
          "$RUNNER_TEMP/consumer/build/app"

      - name: Build a pkg-config consumer
        run: |
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/stage/lib/pkgconfig"
          cc "$RUNNER_TEMP/consumer/main.c" $(pkg-config --cflags --libs xdelta3) -o "$RUNNER_TEMP/app_pc"
          "$RUNNER_TEMP/app_pc"

  blockdev-test:
    name: ${{ matrix.os }} / block-device source
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    defaults:
      run:
        working-directory: xdelta3
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Block-device source test
        run: ./testing/blockdev_test.sh ./build/xdelta3

  go-regtest:
    name: go regression harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build xdelta3
        working-directory: xdelta3
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Vet
        working-directory: xdelta3/go
        run: go vet ./...

      - name: Run harness (smoke + small offset tests)
        working-directory: xdelta3/go
        run: go run . -xdelta3 "$GITHUB_WORKSPACE/xdelta3/build/xdelta3" -min-offset 20 -max-offset 22

