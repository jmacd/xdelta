name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (Debug, Release, etc.)'
        required: false
        default: 'Release'
        type: string
      vcpkg_commit:
        description: 'vcpkg commit hash to use'
        required: false
        default: 'a34c873a9717a888f58dc05268dea15592c2f0ff'
        type: string
      artifact_retention_days:
        description: 'Number of days to retain artifacts'
        required: false
        default: 90
        type: number
      create_archives:
        description: 'Whether to create zip/tar.gz archives for artifacts'
        required: false
        default: false
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
        include:
          - arch: x64
            triplet: x64-windows
            cmake_arch: -A x64
          - arch: x86
            triplet: x86-windows
            cmake_arch: -A Win32

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Make all scripts executable
    - name: Make scripts executable
      shell: bash
      run: |
        if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
          chmod +x .github/scripts/make-scripts-executable.sh
          .github/scripts/make-scripts-executable.sh
        else
          echo "Script not found, making scripts executable manually"
          find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
        fi

    # Setup ccache for faster builds
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.arch }}-ccache-${{ hashFiles('**/*.cpp', '**/*.h', '**/*.c') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-ccache-

    # Set environment variables to help with downloads
    - name: Set vcpkg environment variables
      shell: pwsh
      run: |
        echo "VCPKG_KEEP_ENV_VARS=HTTP_PROXY;HTTPS_PROXY;http_proxy;https_proxy" | Out-File -Append -FilePath $env:GITHUB_ENV
        echo "VCPKG_MAX_CONCURRENCY=2" | Out-File -Append -FilePath $env:GITHUB_ENV

    # Setup vcpkg using vcpkg-action with retry
    - name: Setup vcpkg
      id: vcpkg
      uses: johnwason/vcpkg-action@v6
      with:
        manifest-dir: ${{ github.workspace }}
        triplet: ${{ matrix.triplet }}
        revision: ${{ inputs.vcpkg_commit }}
        token: ${{ github.token }}
        github-binarycache: true
        cache-key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
      continue-on-error: true

    # Install vcpkg dependencies manually
    - name: Install vcpkg dependencies
      shell: pwsh
      run: |
        Write-Host "Installing vcpkg dependencies manually..."

        # Try to install dependencies directly
        $maxAttempts = 3
        $attempt = 1

        while ($attempt -le $maxAttempts) {
          Write-Host "Attempt $attempt of $maxAttempts to install vcpkg dependencies"

          try {
            # Install liblzma directly with verbose output
            Write-Host "Installing liblzma:${{ matrix.triplet }}"
            vcpkg install liblzma:${{ matrix.triplet }} --triplet=${{ matrix.triplet }} --debug
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Successfully installed dependencies"
              break
            }
          }
          catch {
            Write-Host "Error during installation: $_"
          }

          Write-Host "Attempt $attempt failed, waiting before retry..."
          Start-Sleep -Seconds 30
          $attempt++
        }

        if ($attempt -gt $maxAttempts) {
          Write-Host "⚠️ Failed to install dependencies after $maxAttempts attempts"
          # Continue anyway, CMake might be able to find system libraries
        }

        # List installed packages for debugging
        Write-Host "Listing installed vcpkg packages:"
        vcpkg list

    - name: Configure CMake with retry
      shell: pwsh
      run: |
        # Get vcpkg paths
        $vcpkgToolchain = "${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        $vcpkgIncludePath = "${{ github.workspace }}/vcpkg_installed/${{ matrix.triplet }}/include"
        $vcpkgLibPath = "${{ github.workspace }}/vcpkg_installed/${{ matrix.triplet }}/lib"

        # Try to configure with retry
        $maxAttempts = 3
        $attempt = 1

        while ($attempt -le $maxAttempts) {
          Write-Host "Attempt $attempt of $maxAttempts to configure CMake"

          try {
            # Configure with detailed output and ccache
            cmake -B build -S . ${{ matrix.cmake_arch }} `
              -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} `
              -DCMAKE_TOOLCHAIN_FILE="$vcpkgToolchain" `
              -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
              -DXDELTA_ENABLE_LZMA=ON `
              -DXDELTA_BUILD_TESTS=OFF `
              -DCMAKE_INCLUDE_PATH="$vcpkgIncludePath" `
              -DCMAKE_LIBRARY_PATH="$vcpkgLibPath" `
              -DLIBLZMA_INCLUDE_DIR="$vcpkgIncludePath" `
              -DLIBLZMA_LIBRARY="$vcpkgLibPath/liblzma.lib" `
              -DCMAKE_C_COMPILER_LAUNCHER=ccache `
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
              -DCMAKE_VERBOSE_MAKEFILE=ON

            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ CMake configuration successful"
              break
            }
          }
          catch {
            Write-Host "Error during CMake configuration: $_"
          }

          Write-Host "Attempt $attempt failed, waiting before retry..."
          Start-Sleep -Seconds 30
          $attempt++
        }

        if ($attempt -gt $maxAttempts) {
          Write-Host "❌ Failed to configure CMake after $maxAttempts attempts"
          exit 1
        }

    - name: Build with retry
      shell: pwsh
      run: |
        # Try to build with retry
        $maxAttempts = 3
        $attempt = 1

        while ($attempt -le $maxAttempts) {
          Write-Host "Attempt $attempt of $maxAttempts to build"

          try {
            # Use lower concurrency to avoid network issues
            cmake --build build --config ${{ inputs.build_type }} --parallel 2

            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Build successful"
              break
            }
          }
          catch {
            Write-Host "Error during build: $_"
          }

          Write-Host "Attempt $attempt failed, waiting before retry..."
          Start-Sleep -Seconds 30
          $attempt++
        }

        if ($attempt -gt $maxAttempts) {
          Write-Host "❌ Failed to build after $maxAttempts attempts"
          exit 1
        }

    - name: Test executable
      shell: pwsh
      run: |
        # Test if the executable works
        $exePath = "build\${{ inputs.build_type }}\xdelta3.exe"
        if (Test-Path $exePath) {
            Write-Host "Testing executable: $exePath"
            & $exePath --help
            if ($LASTEXITCODE -eq 0) {
                Write-Host "✅ Executable test passed"
            } else {
                Write-Host "⚠️ Executable test returned non-zero exit code: $LASTEXITCODE"
            }
        } else {
            Write-Host "❌ Executable not found at: $exePath"
            exit 1
        }

    - name: Prepare artifacts
      shell: pwsh
      run: |
        # Create artifacts directory
        $artifactsDir = "artifacts\windows-${{ matrix.arch }}"
        New-Item -ItemType Directory -Path $artifactsDir -Force | Out-Null

        # Copy executable
        $exePath = "build\${{ inputs.build_type }}\xdelta3.exe"
        Copy-Item $exePath -Destination $artifactsDir

        # Copy required DLLs from vcpkg
        Write-Host "Copying required DLLs..."
        $vcpkgBinDir = "vcpkg\installed\${{ matrix.arch }}-windows\bin"
        if (Test-Path $vcpkgBinDir) {
            # Copy liblzma DLL if it exists
            $liblzmaDll = Join-Path $vcpkgBinDir "liblzma.dll"
            if (Test-Path $liblzmaDll) {
                Copy-Item $liblzmaDll -Destination $artifactsDir
                Write-Host "✅ Copied liblzma.dll"
            } else {
                Write-Host "⚠️ liblzma.dll not found at: $liblzmaDll"
            }

            # Copy any other required DLLs
            Get-ChildItem -Path $vcpkgBinDir -Filter "*.dll" | ForEach-Object {
                if ($_.Name -match "(lzma|zlib|bzip2)") {
                    Copy-Item $_.FullName -Destination $artifactsDir
                    Write-Host "✅ Copied $($_.Name)"
                }
            }
        } else {
            Write-Host "⚠️ vcpkg bin directory not found: $vcpkgBinDir"
        }

        # Create README manually to avoid path issues
        Write-Host "Creating README.txt manually..."
        $readmePath = Join-Path -Path $artifactsDir -ChildPath "README.txt"
        Set-Content -Path $readmePath -Value "Xdelta3 Windows Binary"
        Add-Content -Path $readmePath -Value "======================"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "This package contains the xdelta3 command-line utility for Windows."
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "Command Line Syntax"
        Add-Content -Path $readmePath -Value "-------------------"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "make patch:"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "  xdelta3.exe -e -s old_file new_file delta_file"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "apply patch:"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "  xdelta3.exe -d -s old_file delta_file decoded_new_file"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "standard options:"
        Add-Content -Path $readmePath -Value "   -0 .. -9     compression level"
        Add-Content -Path $readmePath -Value "   -c           use stdout"
        Add-Content -Path $readmePath -Value "   -d           decompress"
        Add-Content -Path $readmePath -Value "   -e           compress"
        Add-Content -Path $readmePath -Value "   -f           force (overwrite, ignore trailing garbage)"
        Add-Content -Path $readmePath -Value "   -h           show help"
        Add-Content -Path $readmePath -Value "   -q           be quiet"
        Add-Content -Path $readmePath -Value "   -v           be verbose (max 2)"
        Add-Content -Path $readmePath -Value "   -V           show version"
        Add-Content -Path $readmePath -Value " "
        Add-Content -Path $readmePath -Value "For full documentation, run: xdelta3.exe --help"

        Write-Host "README.txt created manually"

        # Create archive if requested
        if ("${{ inputs.create_archives }}" -eq "true") {
            $zipPath = "artifacts\windows-${{ matrix.arch }}\xdelta3-windows-${{ matrix.arch }}.zip"
            Write-Host "Creating ZIP archive: $zipPath"
            Compress-Archive -Path "$artifactsDir\*" -DestinationPath $zipPath -Force
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xdelta3-windows-${{ matrix.arch }}
        path: artifacts/windows-${{ matrix.arch }}/
        retention-days: ${{ inputs.artifact_retention_days }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Make all scripts executable
    - name: Make scripts executable
      run: |
        if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
          chmod +x .github/scripts/make-scripts-executable.sh
          .github/scripts/make-scripts-executable.sh
        else
          echo "Script not found, making scripts executable manually"
          find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
        fi

    # Setup ccache for faster builds
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp', '**/*.h', '**/*.c') }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    # Set environment variables to help with downloads
    - name: Set vcpkg environment variables
      run: |
        echo "VCPKG_KEEP_ENV_VARS=HTTP_PROXY;HTTPS_PROXY;http_proxy;https_proxy" >> $GITHUB_ENV
        echo "VCPKG_MAX_CONCURRENCY=2" >> $GITHUB_ENV

    # Setup vcpkg using vcpkg-action with retry
    - name: Setup vcpkg
      uses: johnwason/vcpkg-action@v6
      id: vcpkg
      with:
        manifest-dir: ${{ github.workspace }}
        triplet: x64-linux
        revision: ${{ inputs.vcpkg_commit }}
        token: ${{ github.token }}
        github-binarycache: true
        cache-key: vcpkg-${{ runner.os }}-x64-linux-${{ hashFiles('vcpkg.json') }}
      continue-on-error: true

    # Install vcpkg dependencies manually
    - name: Install vcpkg dependencies
      run: |
        echo "Installing vcpkg dependencies manually..."

        # Try to install dependencies directly
        max_attempts=3
        attempt=1

        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts to install vcpkg dependencies"

          # Install liblzma directly with verbose output
          echo "Installing liblzma:x64-linux"
          vcpkg install liblzma:x64-linux --triplet=x64-linux --debug && break

          echo "Attempt $attempt failed, waiting before retry..."
          sleep 30
          attempt=$((attempt+1))
        done

        if [ $attempt -gt $max_attempts ]; then
          echo "⚠️ Failed to install dependencies after $max_attempts attempts"
          # Continue anyway, CMake might be able to find system libraries
        fi

        # List installed packages for debugging
        echo "Listing installed vcpkg packages:"
        vcpkg list

    - name: Configure CMake with retry
      run: |
        # Try to configure with retry
        max_attempts=3
        attempt=1

        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts to configure CMake"

          # Add additional CMake options to help with dependency resolution
          EXTRA_OPTIONS="-DCMAKE_DISABLE_FIND_PACKAGE_LibLZMA=OFF -DVCPKG_TARGET_TRIPLET=x64-linux"

          # Simple configuration relying on vcpkg integration with ccache
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DXDELTA_ENABLE_LZMA=ON \
            -DXDELTA_BUILD_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            $EXTRA_OPTIONS && break

          echo "Attempt $attempt failed, waiting before retry..."
          sleep 30
          attempt=$((attempt+1))
        done

        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Failed to configure CMake after $max_attempts attempts"
          exit 1
        else
          echo "✅ CMake configuration successful"
        fi

    - name: Build with retry
      run: |
        # Try to build with retry
        max_attempts=3
        attempt=1

        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts to build"

          # Use lower concurrency to avoid network issues
          cmake --build build --config ${{ inputs.build_type }} --parallel 2 && break

          echo "Attempt $attempt failed, waiting before retry..."
          sleep 30
          attempt=$((attempt+1))
        done

        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Failed to build after $max_attempts attempts"
          exit 1
        else
          echo "✅ Build successful"
        fi

    - name: Test executable
      run: |
        # Test if the executable works
        if [ -f "build/xdelta3" ]; then
          echo "Testing executable: build/xdelta3"
          ./build/xdelta3 --help
          if [ $? -eq 0 ]; then
            echo "✅ Executable test passed"
          else
            echo "⚠️ Executable test returned non-zero exit code: $?"
          fi
        else
          echo "❌ Executable not found at: build/xdelta3"
          exit 1
        fi

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts/linux

        # Copy executables
        cp build/xdelta3 artifacts/linux/

        # Create README manually to avoid script dependencies
        echo "Creating README.txt manually..."

        # Write README content line by line
        echo "Xdelta3 Linux Binary" > artifacts/linux/README.txt
        echo "===================" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "This package contains the xdelta3 command-line utility for Linux." >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "Command Line Syntax" >> artifacts/linux/README.txt
        echo "-------------------" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "make patch:" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "  xdelta3 -e -s old_file new_file delta_file" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "apply patch:" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "  xdelta3 -d -s old_file delta_file decoded_new_file" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "standard options:" >> artifacts/linux/README.txt
        echo "   -0 .. -9     compression level" >> artifacts/linux/README.txt
        echo "   -c           use stdout" >> artifacts/linux/README.txt
        echo "   -d           decompress" >> artifacts/linux/README.txt
        echo "   -e           compress" >> artifacts/linux/README.txt
        echo "   -f           force (overwrite, ignore trailing garbage)" >> artifacts/linux/README.txt
        echo "   -h           show help" >> artifacts/linux/README.txt
        echo "   -q           be quiet" >> artifacts/linux/README.txt
        echo "   -v           be verbose (max 2)" >> artifacts/linux/README.txt
        echo "   -V           show version" >> artifacts/linux/README.txt
        echo "" >> artifacts/linux/README.txt
        echo "For full documentation, run: xdelta3 --help" >> artifacts/linux/README.txt

        # Verify README was created successfully
        if [ -f "artifacts/linux/README.txt" ]; then
          echo "README.txt created successfully"
          head -n 3 artifacts/linux/README.txt
        else
          echo "ERROR: Failed to create README.txt"
          exit 1
        fi

        # Create archive if requested
        if [ "${{ inputs.create_archives }}" == "true" ]; then
          echo "Creating tar.gz archive: artifacts/linux/xdelta3-linux.tar.gz"
          # Use tar with explicit file list to avoid "file changed as we read it" errors
          cd artifacts/linux
          tar -czf xdelta3-linux.tar.gz *
          cd ../..
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xdelta3-linux
        path: artifacts/linux/
        retention-days: ${{ inputs.artifact_retention_days }}

  build-macos:
    runs-on: macos-latest
    continue-on-error: true  # Allow macOS build to fail without failing the workflow

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Make all scripts executable
    - name: Make scripts executable
      run: |
        if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
          chmod +x .github/scripts/make-scripts-executable.sh
          .github/scripts/make-scripts-executable.sh
        else
          echo "Script not found, making scripts executable manually"
          find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
        fi

    # Create placeholder artifacts for macOS
    - name: Create placeholder artifacts
      run: |
        mkdir -p artifacts/macos

        # Create README explaining macOS build is disabled
        echo "# Xdelta3 macOS Binary (Temporarily Disabled)" > artifacts/macos/README.txt
        echo "=============================================" >> artifacts/macos/README.txt
        echo "" >> artifacts/macos/README.txt
        echo "NOTICE: macOS build is temporarily disabled due to C++11 literal suffix issues." >> artifacts/macos/README.txt
        echo "Please use Windows or Linux platforms." >> artifacts/macos/README.txt
        echo "" >> artifacts/macos/README.txt
        echo "For more information, see the project repository." >> artifacts/macos/README.txt

        # Create archive if requested
        if [ "${{ inputs.create_archives }}" == "true" ]; then
          echo "Creating tar.gz archive: artifacts/macos/xdelta3-macos.tar.gz"
          # Use tar with explicit file list to avoid "file changed as we read it" errors
          cd artifacts/macos
          tar -czf xdelta3-macos.tar.gz *
          cd ../..
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xdelta3-macos
        path: artifacts/macos/
        retention-days: ${{ inputs.artifact_retention_days }}
