name: Update vcpkg Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (without v prefix)'
        required: true
        default: '3.1.0'
      sha512:
        description: 'SHA512 hash of the binary package'
        required: true

jobs:
  update-registry:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Update portfile.cmake
      run: |
        # Update SHA512 in portfile.cmake
        PORTFILE_PATH="vcpkg-registry/ports/xdelta/portfile.cmake"
        sed -i 's|SHA512 "将在发布后填写实际的哈希值"|SHA512 "${{ github.event.inputs.sha512 }}"|g' $PORTFILE_PATH
        
        # Update version in vcpkg.json if needed
        VCPKG_JSON_PATH="vcpkg-registry/ports/xdelta/vcpkg.json"
        sed -i 's|"version": "[0-9.]*"|"version": "${{ github.event.inputs.version }}"|g' $VCPKG_JSON_PATH
        
        # Update version in versions/x-/xdelta.json
        VERSION_JSON_PATH="vcpkg-registry/versions/x-/xdelta.json"
        sed -i 's|"version": "[0-9.]*"|"version": "${{ github.event.inputs.version }}"|g' $VERSION_JSON_PATH
        
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Update vcpkg registry for version ${{ github.event.inputs.version }}"
        title: "Update vcpkg registry for version ${{ github.event.inputs.version }}"
        body: |
          This PR updates the vcpkg registry for version ${{ github.event.inputs.version }}.
          
          Changes:
          - Updated SHA512 hash in portfile.cmake
          - Updated version references
          
          This PR was created automatically by the update-vcpkg-registry workflow.
        branch: update-vcpkg-registry-${{ github.event.inputs.version }}
        base: main
