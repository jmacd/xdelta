name: Reusable Artifact Processing Workflow

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to process artifacts for (windows, linux, macos)'
        required: true
        type: string
      arch:
        description: 'Architecture to process artifacts for (x64, x86)'
        required: false
        type: string
        default: 'x64'
      artifacts_dir:
        description: 'Directory to store artifacts'
        required: false
        type: string
        default: './artifacts'
      create_placeholders:
        description: 'Whether to create placeholder artifacts if real ones are not found'
        required: false
        type: boolean
        default: false
      validation_level:
        description: 'Validation level (strict, normal, relaxed)'
        required: false
        type: string
        default: 'normal'
      artifact_name:
        description: 'Name of the artifact to download'
        required: false
        type: string
        default: ''
    outputs:
      artifacts_ok:
        description: 'Whether artifacts were processed successfully'
        value: ${{ jobs.process-artifacts.outputs.artifacts_ok }}
      error_messages:
        description: 'Error messages if any'
        value: ${{ jobs.process-artifacts.outputs.error_messages }}
      warning_messages:
        description: 'Warning messages if any'
        value: ${{ jobs.process-artifacts.outputs.warning_messages }}

jobs:
  process-artifacts:
    runs-on: ubuntu-latest
    outputs:
      artifacts_ok: ${{ steps.verify_artifacts.outputs.artifacts_ok }}
      error_messages: ${{ steps.verify_artifacts.outputs.error_messages }}
      warning_messages: ${{ steps.verify_artifacts.outputs.warning_messages }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Make all scripts executable
      - name: Make scripts executable
        shell: bash
        run: |
          if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
            chmod +x .github/scripts/make-scripts-executable.sh
            .github/scripts/make-scripts-executable.sh
          else
            echo "Script not found, making scripts executable manually"
            find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
          fi

      # Set artifact name if not provided
      - name: Set artifact name
        id: set_artifact_name
        run: |
          if [ -z "${{ inputs.artifact_name }}" ]; then
            if [ "${{ inputs.platform }}" == "windows" ]; then
              echo "ARTIFACT_NAME=xdelta3-${{ inputs.platform }}-${{ inputs.arch }}" >> $GITHUB_ENV
            else
              echo "ARTIFACT_NAME=xdelta3-${{ inputs.platform }}" >> $GITHUB_ENV
            fi
          else
            echo "ARTIFACT_NAME=${{ inputs.artifact_name }}" >> $GITHUB_ENV
          fi

      # Download artifacts
      - name: Download artifacts
        id: download_artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ inputs.artifacts_dir }}/${{ inputs.platform }}${{ inputs.platform == 'windows' && format('-{0}', inputs.arch) || '' }}
        continue-on-error: true

      # Verify downloaded artifacts
      - name: Verify artifacts
        id: verify_artifacts
        shell: bash
        run: |
          echo "Listing downloaded artifacts:"
          ls -la ${{ inputs.artifacts_dir }} || mkdir -p ${{ inputs.artifacts_dir }}
          
          # Create platform-specific artifacts directory if it doesn't exist
          PLATFORM_DIR="${{ inputs.artifacts_dir }}/${{ inputs.platform }}${{ inputs.platform == 'windows' && format('-{0}', inputs.arch) || '' }}"
          mkdir -p "$PLATFORM_DIR"
          
          # Make scripts executable
          chmod +x .github/scripts/unified-artifacts.sh
          
          # Initialize variables
          ARTIFACTS_OK=true
          ERROR_MESSAGES=""
          WARNING_MESSAGES=""
          
          # Verify artifacts using unified script
          echo "Verifying ${{ inputs.platform }} artifacts..."
          
          # Check if artifacts directory is empty
          if [ -z "$(ls -A "$PLATFORM_DIR")" ] && [ "${{ inputs.create_placeholders }}" == "true" ]; then
            echo "⚠️ No artifacts found, creating placeholders"
            WARNING_MESSAGES="${WARNING_MESSAGES}No artifacts found, using placeholders; "
            
            # Create placeholder files based on platform
            if [ "${{ inputs.platform }}" == "windows" ]; then
              echo "Creating Windows placeholder files"
              echo "This is a placeholder file for testing" > "$PLATFORM_DIR/xdelta3.exe"
              echo "# README for xdelta3" > "$PLATFORM_DIR/README.txt"
            elif [ "${{ inputs.platform }}" == "linux" ]; then
              echo "Creating Linux placeholder files"
              echo "This is a placeholder file for testing" > "$PLATFORM_DIR/xdelta3"
              chmod +x "$PLATFORM_DIR/xdelta3"
              echo "# README for xdelta3" > "$PLATFORM_DIR/README.txt"
            elif [ "${{ inputs.platform }}" == "macos" ]; then
              echo "Creating macOS placeholder files"
              echo "# README for xdelta3 (macOS build disabled)" > "$PLATFORM_DIR/README.txt"
            fi
          fi
          
          # Run verification with appropriate error handling based on validation level
          if [ "${{ inputs.validation_level }}" == "strict" ]; then
            # Strict validation - fail on any error
            .github/scripts/unified-artifacts.sh verify ${{ inputs.platform }} "$PLATFORM_DIR" ${{ inputs.platform == 'windows' && inputs.arch || '' }}
            if [ $? -ne 0 ]; then
              ARTIFACTS_OK=false
              ERROR_MESSAGES="${ERROR_MESSAGES}Artifact verification failed; "
            fi
          elif [ "${{ inputs.validation_level }}" == "relaxed" ]; then
            # Relaxed validation - continue on error, just log warnings
            .github/scripts/unified-artifacts.sh verify ${{ inputs.platform }} "$PLATFORM_DIR" ${{ inputs.platform == 'windows' && inputs.arch || '' }} || {
              WARNING_MESSAGES="${WARNING_MESSAGES}Artifact verification had issues but continuing; "
            }
          else
            # Normal validation - fail on error unless placeholders are used
            .github/scripts/unified-artifacts.sh verify ${{ inputs.platform }} "$PLATFORM_DIR" ${{ inputs.platform == 'windows' && inputs.arch || '' }} || {
              if [ "${{ inputs.create_placeholders }}" == "true" ]; then
                WARNING_MESSAGES="${WARNING_MESSAGES}Using placeholder artifacts; "
              else
                ARTIFACTS_OK=false
                ERROR_MESSAGES="${ERROR_MESSAGES}Artifact verification failed; "
              fi
            }
          fi
          
          # Set outputs
          echo "artifacts_ok=$ARTIFACTS_OK" >> $GITHUB_OUTPUT
          echo "error_messages=$ERROR_MESSAGES" >> $GITHUB_OUTPUT
          echo "warning_messages=$WARNING_MESSAGES" >> $GITHUB_OUTPUT
          
          # Exit with error if artifacts are not OK and validation is strict
          if [ "$ARTIFACTS_OK" = "false" ] && [ "${{ inputs.validation_level }}" == "strict" ]; then
            echo "::error::Artifact validation failed: $ERROR_MESSAGES"
            exit 1
          fi
