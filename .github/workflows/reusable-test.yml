name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to test on (windows, linux, macos)'
        required: true
        type: string
      arch:
        description: 'Architecture to test on (x64, x86)'
        required: false
        type: string
        default: 'x64'
      artifacts_dir:
        description: 'Directory containing artifacts to test'
        required: true
        type: string

jobs:
  test:
    name: Test ${{ inputs.platform }}-${{ inputs.arch }}
    runs-on: ${{ inputs.platform == 'windows' && 'windows-latest' || inputs.platform == 'linux' && 'ubuntu-latest' || 'macos-latest' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Make all scripts executable
      - name: Make scripts executable
        shell: bash
        run: |
          if [ -f ".github/scripts/make-scripts-executable.sh" ]; then
            chmod +x .github/scripts/make-scripts-executable.sh
            .github/scripts/make-scripts-executable.sh
          else
            echo "Script not found, making scripts executable manually"
            find .github/scripts -name "*.sh" -type f -exec chmod +x {} \;
          fi
      
      # Download artifacts
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: xdelta3-${{ inputs.platform }}${{ inputs.arch != 'x64' && '-' || '' }}${{ inputs.arch != 'x64' && inputs.arch || '' }}
          path: ${{ inputs.artifacts_dir }}
      
      # Verify artifacts
      - name: Verify artifacts
        shell: bash
        run: |
          chmod +x .github/scripts/process-artifacts.sh
          .github/scripts/process-artifacts.sh verify ${{ inputs.platform }} ${{ inputs.artifacts_dir }} ${{ inputs.arch }}
      
      # Test executable
      - name: Test executable
        shell: bash
        run: |
          echo "Testing executable..."
          
          if [ "${{ inputs.platform }}" = "windows" ]; then
            EXE_PATH="${{ inputs.artifacts_dir }}/xdelta3.exe"
            if [ -f "$EXE_PATH" ]; then
              echo "Running: $EXE_PATH --help"
              "$EXE_PATH" --help || echo "Exit code: $?"
            else
              echo "::error::Executable not found: $EXE_PATH"
              exit 1
            fi
          elif [ "${{ inputs.platform }}" = "linux" ]; then
            EXE_PATH="${{ inputs.artifacts_dir }}/xdelta3"
            if [ -f "$EXE_PATH" ]; then
              chmod +x "$EXE_PATH"
              echo "Running: $EXE_PATH --help"
              "$EXE_PATH" --help || echo "Exit code: $?"
            else
              echo "::error::Executable not found: $EXE_PATH"
              exit 1
            fi
          elif [ "${{ inputs.platform }}" = "macos" ]; then
            echo "macOS build is disabled, skipping executable test"
          else
            echo "::error::Unknown platform: ${{ inputs.platform }}"
            exit 1
          fi
